<!DOCTYPE html> 
<html> 
    <head> 
        <title>Pizza Order Counter</title>
        <style>
            body { 
                background-color: #f4f1ea; 
                display: flex; 
                justify-content: center; 
                align-items: center; 
                height: 100vh; 
            }

            .container {
                background-color: #2d2d2d; 
                color: white;
                padding: 40px; 
                border-radius: 20px;
                display: flex; 
                flex-direction: column; 
                align-items: center;
                width: 350px;
                border-top: 8px solid #e74c3c;
            }

            img {
                width: 150px;
                margin-bottom: 20px;
            }

            #counter { 
                font-size: 60px; 
                font-weight: bold; 
                margin: 20px 0;
            }

            button {
                padding: 12px 20px;
                border-radius: 8px;
                font-weight: bold;
                cursor: pointer;
            }

            .btn-take { background-color: #27ae60; color: white; }
            .btn-cancel { background-color: #e74c3c; color: white; }

            #total { 
                margin-top: 30px; 
                padding-top: 20px;
                border-top: 1px solid #444;
                width: 100%;
                text-align: center;
                color: #f1c40f;
            }
        </style>
    </head>
    <body>

        <div class="container"> 
            <img src="https://cdn-icons-png.flaticon.com/512/3595/3595455.png" alt="Pizza">
            
            <h1>Pizza Counter</h1>

            <div id="counter">0</div>

            <div>
                <button class="btn-take" onclick="TakeOrder()">+ Take Order</button>
                <button class="btn-cancel" onclick="CancelOrder()">- Cancel Order</button>
            </div>

            <div id="total">
                <h3>Total Price: Rs. 0</h3>
            </div>
        </div>

        <script>
            let counter = 0;
            const price = 500;

            function TakeOrder() {
                counter++;
                updateUI();
            }

            function CancelOrder() {
                if(counter > 0) counter--;
                updateUI();
            }

            function updateUI() {
                document.getElementById("counter").innerText = counter;
                document.getElementById("total").innerHTML = "<h3>Total Price: Rs. " + (counter * price) + "</h3>";
            }
        </script>

    </body>
</html>
